<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engagement OS, Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#11202e; --ink-2:#1b3142; --paper:#f5f6f4; --card:#ffffff; --line:#e4e8e5;
  --muted:#5b6b78; --muted-2:#8997a1;
  --teal:#0f9e8e; --teal-deep:#0b7d70; --amber:#d8862a; --red:#c4503e; --indigo:#3b5bdb;
  --hi-bg:#e9f6f3; --med-bg:#fbf1e3; --lo-bg:#fbe9e5;
  --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
  --shadow:0 1px 0 rgba(17,32,46,.04),0 14px 30px -20px rgba(17,32,46,.3);
}
*{box-sizing:border-box} html,body{margin:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer}

.topbar{display:flex;align-items:center;gap:12px;padding:14px 26px;background:var(--ink);color:#eaf0ee;position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:11px}
.brand h1{font-family:var(--display);font-weight:600;font-size:17px;margin:0;letter-spacing:-.01em}
.brand small{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:#8fb7af;text-transform:uppercase;margin-top:1px}
.live-tag{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9fd9cf;display:flex;align-items:center;gap:6px}
.live-tag .g{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.wrap{max-width:1140px;margin:0 auto;padding:26px 26px 90px}

/* top row: 3 tiles */
.toprow{display:grid;grid-template-columns:1fr 1fr 1.25fr;gap:14px;margin-bottom:16px;align-items:stretch}
@media(max-width:820px){.toprow{grid-template-columns:1fr}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:center}
.kpi .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2)}
.kpi .v{font-family:var(--display);font-size:30px;font-weight:600;margin-top:8px;letter-spacing:-.02em}
.kpi .v small{font-size:13px;color:var(--muted);font-weight:400;font-family:var(--body)}
.kpi .sub{font-size:12px;color:var(--muted);margin-top:4px}
.pbh-tile{justify-content:flex-start}
.pbh-tile .k{margin-bottom:6px}
.dist{display:flex;align-items:flex-end;gap:18px;height:88px;padding:0 4px}
.dist .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.dist .bar{width:100%;border-radius:6px 6px 0 0;min-height:5px;flex-shrink:0;transition:height .8s cubic-bezier(.4,0,.1,1)}
.dist .cnt{font-family:var(--display);font-weight:600;font-size:15px;margin-bottom:4px}
.dist .lab{font-size:11px;color:var(--muted);margin-top:6px}

/* triage table */
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}
.tbl-head{padding:15px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.tbl-head h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0}
.tbl-head .hint{font-size:11.5px;color:var(--muted-2)}
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);text-align:left;padding:8px 18px;border-bottom:1px solid var(--line);font-weight:400}
tbody tr{cursor:pointer;transition:background .14s;border-bottom:1px solid var(--line)}
tbody tr:last-child{border-bottom:0}
tbody tr:hover{background:#f1f6f4}
tbody td{padding:13px 18px;font-size:13.5px;vertical-align:middle}
.co{font-weight:600} .co .seg{font-weight:400;color:var(--muted);font-size:12px;margin-top:1px}
.co .liveflag{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-deep);margin-left:8px;display:inline-flex;align-items:center;gap:4px}
.co .liveflag .g{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 1.8s infinite;display:inline-block}
.hmini{display:flex;align-items:center;gap:9px}
.hmini b{font-family:var(--display);font-weight:600;font-size:15px;min-width:24px}
.hbar{width:46px;height:6px;border-radius:99px;background:#eef1ee;overflow:hidden}
.hbar i{display:block;height:100%;border-radius:99px}
.pill{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:4px 9px;border-radius:99px;white-space:nowrap;text-transform:uppercase}
.pill.lo{background:var(--lo-bg);color:#a23a2a} .pill.med{background:var(--med-bg);color:#a4641a} .pill.hi{background:var(--hi-bg);color:var(--teal-deep)}
.na-cell{font-size:12.5px;color:var(--ink-2)}
.na-cell b{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:2px}
.na-cell.expand b{color:var(--teal-deep)} .na-cell.intervene b{color:#a4641a} .na-cell.nurture b{color:var(--muted)} .na-cell.live b{color:var(--teal-deep)}
.arrow{color:var(--muted-2);font-size:15px}

/* recents */
.recents{margin-top:18px}
.rec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rec-head h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0}
.rec-head .hint{font-size:11.5px;color:var(--muted-2)}
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.rec-grid{grid-template-columns:1fr}}
.rec{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:var(--shadow);display:flex;flex-direction:column;border-top:3px solid var(--line)}
.rec.active{border-top-color:var(--teal)}
.rec .rt{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rec .nm{font-weight:600;font-size:14px}
.rec .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);display:flex;align-items:center;gap:5px}
.rec.active .st{color:var(--teal-deep)}
.rec.active .st .g{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 1.8s infinite}
.rec .line{font-size:13px;color:var(--ink-2);font-style:italic;line-height:1.4;margin-bottom:12px}
.rec .takes{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.rec .tk{font-size:12px;color:var(--muted);display:flex;gap:6px;line-height:1.4}
.rec .tk .b{color:var(--teal-deep);font-size:13px;line-height:1}
.rec .cta{margin-top:auto}
.rec .stepin{background:var(--ink);color:#fff;border:0;border-radius:9px;font-weight:600;font-size:13px;padding:9px 14px;width:100%}
.rec .view{background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;font-size:13px;padding:9px 14px;width:100%}

/* detail */
.hidden{display:none!important}
.back{display:inline-flex;align-items:center;gap:7px;background:none;border:0;color:var(--muted);font-size:13px;padding:0;margin-bottom:14px}
.back:hover{color:var(--ink)}
.dhead{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.dhead h2{font-family:var(--display);font-weight:600;font-size:26px;margin:0;letter-spacing:-.02em}
.dhead .seg{color:var(--muted);font-size:13.5px;margin-top:3px}
.dbadge{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;border-radius:99px;align-self:center;margin-left:auto}
.dtop{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:760px){.dtop{grid-template-columns:1fr}}
.score-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;text-align:center}
.score-card h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0 0 14px;align-self:flex-start}
.ring{position:relative;width:128px;height:128px}
.ring svg{transform:rotate(-90deg)}
.ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:38px;font-weight:600}
.delta{margin-top:12px;font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:6px}
.delta.up{color:var(--teal-deep)} .delta.down{color:var(--red)}
.stagechip{margin-top:10px;font-size:12px;color:var(--muted)}
.stagechip b{color:var(--ink)}
.trend-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--shadow)}
.trend-card h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0 0 6px}
.trend-svg{width:100%;height:150px;display:block}
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px;box-shadow:var(--shadow)}
.panel h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin:0 0 14px}
.eng-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.eng-row:last-child{border-bottom:0}
.eng-row .n{font-family:var(--display);font-weight:600;font-size:16px;min-width:34px}
.eng-row .lab{font-size:13px;min-width:120px}
.sent{flex:1;height:8px;border-radius:99px;overflow:hidden;display:flex;background:#eef1ee}
.sent i{height:100%}
.sent .pos{background:var(--teal)} .sent .neu{background:#c2cdc8} .sent .neg{background:var(--amber)}
.live-card{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;border-top:3px solid var(--teal)}
.live-card .lh{padding:13px 18px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line)}
.live-card .lh h3{font-family:var(--display);font-weight:600;font-size:15px;margin:0}
.live-card .lh .sub{font-size:11.5px;color:var(--muted)}
.live-card .lh .badge{margin-left:auto;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-deep);display:flex;align-items:center;gap:5px}
.live-card .lh .badge .g{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 1.8s infinite}
.stream{padding:16px 18px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto}
.b{max-width:80%;padding:9px 12px;border-radius:12px;font-size:13.5px;line-height:1.45;white-space:pre-wrap}
.b.customer{background:#eef3f1;align-self:flex-start;border-bottom-left-radius:4px}
.b.twin{background:#e7f4f1;align-self:flex-end;border-bottom-right-radius:4px}
.b.human{background:var(--ink);color:#eaf0ee;align-self:flex-end;border-bottom-right-radius:4px}
.take{align-self:flex-start;font-size:11.5px;color:var(--muted);font-style:italic;margin:-4px 0 2px;display:flex;gap:6px}
.take b{font-family:var(--mono);font-style:normal;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-deep);white-space:nowrap;padding-top:1px}
.stream .empty{color:var(--muted-2);font-size:12.5px;text-align:center;padding:22px 0}
.ctrl{display:flex;flex-wrap:wrap;gap:9px;padding:12px 18px;border-top:1px solid var(--line)}
.ctrl .takeover{background:var(--ink);color:#fff;border:0;border-radius:9px;font-weight:600;font-size:13px;padding:9px 15px}
.ctrl .takeover.on{background:var(--teal-deep)}
.ctrl .hinput{flex:1;min-width:140px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:13px;color:var(--ink)}
.ctrl .hinput:disabled{background:var(--paper);color:var(--muted-2)}
.ctrl .hsend{background:var(--teal);color:#04221e;border:0;border-radius:9px;font-weight:600;font-size:13px;padding:9px 15px}
.ctrl .hsend:disabled{opacity:.45;cursor:default}
.ctrl .reset{background:none;border:1px solid var(--line);border-radius:9px;color:var(--muted);font-size:13px;padding:9px 13px}
.casebox{background:var(--ink);color:#e8efed;border-radius:13px;padding:18px 19px}
.casebox.intervene{background:#3a2a16}
.casebox h3{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#7fb8ad;margin:0 0 9px}
.casebox.intervene h3{color:#e3b483}
.casebox p{margin:0 0 12px;font-size:13.5px;line-height:1.55}
.casebox .act{display:inline-block;background:var(--teal);color:#04221e;font-weight:600;font-size:13px;padding:9px 16px;border-radius:9px;border:0}
.casebox.intervene .act{background:var(--amber);color:#2e1804}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div><h1>Engagement Dashboard</h1></div>
  </div>
</div>

<!-- PORTFOLIO -->
<div class="wrap" id="portfolio">
  <div class="toprow" id="toprow"></div>
  <div class="tbl-wrap">
    <div class="tbl-head"><h3>Companies</h3><span class="hint">sorted by risk, riskiest first</span></div>
    <table>
      <thead><tr><th>Account</th><th>Health</th><th>Signal</th><th>Next action</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="recents">
    <div class="rec-head"><h3>Recent conversations</h3><span class="hint">latest activity across the book</span></div>
    <div class="rec-grid" id="recents"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="wrap hidden" id="detail"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, getDoc, getDocs, writeBatch, query, orderBy, onSnapshot, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config stays as-is.
const firebaseConfig = {
  apiKey: "AIzaSyB-_ooiEhmIRoOGxgrueJKJHv6DOj-kpGE",
  authDomain: "engagement-os-c0294.firebaseapp.com",
  projectId: "engagement-os-c0294",
  storageBucket: "engagement-os-c0294.firebasestorage.app",
  messagingSenderId: "262777909440",
  appId: "1:262777909440:web:4662437f82eca8249b3d25",
  measurementId: "G-9344JJVN4R"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Ensure the one live seat exists. No seed button, every other company is hardcoded.
setDoc(doc(db, "accounts", "democo"), { name: "DemoCo", mode: "ai" }, { merge: true });

const KOTTER=["Urgency","Coalition","Vision","Short-term wins","Consolidation","Expansion"];

const accounts={
  vertex:{name:"Vertex Logistics",seg:"Logistics · 800 employees",band:"lo",health:38,delta:-8,stageIdx:1,
    signal:"Champion silent 18 days",na:"intervene",naLabel:"Step in now",
    trend:[52,50,49,47,46,44,42,41,40,39,40,38],
    eng:[["Ramp chats",9,[20,40,40]],["Questions answered",18,[33,45,22]],["Escalations to you",0,[100,0,0]]],
    chat:[
      ["customer","Where do I find the notes after an interview?","Basic navigation, early ramp."],
      ["twin","Right in the candidate's profile, under that interview, saved the moment the call ends. Want me to show you the share button too?"],
      ["customer","Got it. Honestly though, no one else on my team is using it.","Adoption stuck at one user."],
      ["twin","That's the real blocker, not the product. Let's get one teammate a quick win this week. Who's your most curious colleague?"],
      ["customer","Maybe next quarter, we're swamped.","Soft brush-off. Urgency missing."]
    ],
    case:{title:"Intervention plan",p:["Vertex is stuck at the coalition stage. One recruiter is not a movement, and the buyer has seen no proof. Left alone, this is a quiet churn in two quarters.","Get the one active recruiter's result in front of the VP as a concrete win, recruit a second believer, and manufacture the urgency the signing never created."],act:"Book intervention call"}},

  democo:{name:"DemoCo",seg:"Software · 700 employees",band:"med",health:60,delta:1,stageIdx:2,live:true,
    signal:"Active conversation",na:"live",naLabel:"Live, step in",
    trend:[60,61,61,62,63,62,63,64,63,64,64,64],
    eng:[["Ramp chats",6,[60,30,10]],["Questions answered",12,[62,28,10]],["Escalations to you",1,[100,0,0]]],
    chat:[
      ["customer","Hey, how do I get the Notetaker to join my Zoom calls automatically?","Setup question, automation."],
      ["twin","Connect your calendar once in Settings, then it joins every scheduled interview on its own. Want the 30-second setup?"],
      ["customer","Yes please.","Ready to configure."],
      ["twin","Settings, Integrations, connect Google Calendar, done. It joins your next loop. Following?"],
      ["customer","Where do I see the report after the call?","Wants the output location. Live, unanswered."]
    ],
    case:{title:"Live seat",p:["This is the live demo account. The interviewers chat in here, and the conversation streams in below in real time.","Hit Take over whenever you want to answer them directly."],act:"Open live chat"}},

  cobalt:{name:"Cobalt Health",seg:"Healthtech · 1,100 employees",band:"med",health:61,delta:2,stageIdx:2,
    signal:"Steady, no champion yet",na:"nurture",naLabel:"Nurture",
    trend:[57,58,57,59,60,59,60,61,60,61,61,61],
    eng:[["Ramp chats",17,[55,35,10]],["Questions answered",41,[60,30,10]],["Escalations to you",1,[100,0,0]]],
    chat:[
      ["customer","Can you show me how the compliance side works for our legal team?","Trust question, compliance."],
      ["twin","Every candidate hits the same scorecard and access is controlled per role. I can send the SOC 2 and data-handling summary legal will want. Want it?"],
      ["customer","Yes. And where do I find past interview reports?","Navigation, Reports."],
      ["twin","Under Reports, filter by role or date. The weekly digest is the one most people send to hiring managers. Make sense?"],
      ["customer","Perfect, thank you.","Satisfied, deepening usage."]
    ],
    case:{title:"Growth plan",p:["Cobalt is healthy but lacks a clear internal champion. Adoption is broad and shallow.","Convert the most active recruiter into an advocate, then use the compliance comfort to unlock the wider rollout."],act:"Identify the champion"}},

  meridian:{name:"Meridian Retail",seg:"Retail · 3,200 employees",band:"hi",health:71,delta:4,stageIdx:3,
    signal:"Win landed, ready to widen",na:"nurture",naLabel:"Expand soon",
    trend:[58,59,61,62,63,62,64,65,64,65,66,66],
    eng:[["Ramp chats",21,[65,28,7]],["Questions answered",53,[70,25,5]],["Escalations to you",2,[100,0,0]]],
    chat:[
      ["customer","The weekly report is replacing my manual update. Can my store-hiring team get this too?","Expansion intent, second team."],
      ["twin","Yes, that's the path. They get their own workspace with the same setup. Want me to line it up?"],
      ["customer","How do I add them?","Ready to expand."],
      ["twin","Invite them in team settings, pick the store-hiring template, live the same day. Following so far?"],
      ["customer","Great, let's do it.","Committed to expansion."]
    ],
    case:{title:"Expansion case",p:["Meridian has its first visible win and is naming a second team. This is the moment to widen before the quarter closes.","Package the corporate-recruiting proof and walk it into store-hiring, then hand Sales a warm second-seat motion."],act:"Draft expansion brief"}},

  lumen:{name:"Lumen Financial",seg:"Fintech · 1,200 employees",band:"hi",health:84,delta:6,stageIdx:3,liveTag:true,
    signal:"Champion asked about a 2nd team",na:"expand",naLabel:"Ready to expand",
    trend:[70,72,71,74,76,75,78,80,79,82,83,84],
    eng:[["Ramp chats",31,[80,16,4]],["Questions answered",88,[82,14,4]],["Escalations to you",2,[100,0,0]]],
    chat:[
      ["customer","The team stopped taking manual notes. Can we set up People Ops the same way?","Expansion intent, champion-led."],
      ["twin","Love it. People Ops gets its own space with your proven setup as the template. Shall I prep the rollout?"],
      ["customer","Yes. Where do hiring managers see the summaries?","Wants manager visibility."],
      ["twin","By email and in their candidate view, no login gymnastics. Want me to switch that on for People Ops?"],
      ["customer","Perfect.","Value landing, ready to grow."]
    ],
    case:{title:"Expansion case",p:["Lumen has hit every adoption marker: full-team usage, Reports adopted, champion volunteering the next team.","Do not wait for renewal. Package the TA proof, walk it into People Ops now, and hand Sales a warm second-seat motion."],act:"Draft expansion brief"}}
};
const ORDER=["vertex","democo","cobalt","meridian","lumen"];

function bandColor(b){return b==="hi"?"var(--teal)":b==="med"?"var(--amber)":"var(--red)";}
function bandPill(b){return b==="hi"?"hi":b==="med"?"med":"lo";}

function renderTop(){
  const lo=ORDER.filter(id=>accounts[id].band==="lo").length;
  const med=ORDER.filter(id=>accounts[id].band==="med").length;
  const hi=ORDER.filter(id=>accounts[id].band==="hi").length;
  const max=Math.max(lo,med,hi,1);
  const col=(c,n,lab)=>`<div class="col"><div class="cnt">${n}</div><div class="bar" style="background:${c};height:${Math.max(6,(n/max)*50)}px"></div><div class="lab">${lab}</div></div>`;
  document.getElementById("toprow").innerHTML=`
    <div class="kpi"><div class="k">Expansion pipeline</div><div class="v">$850K</div><div class="sub">1 ready · 1 soon</div></div>
    <div class="kpi"><div class="k">Active this week</div><div class="v">47<small> chats</small></div><div class="sub">+9 vs last week</div></div>
    <div class="kpi pbh-tile"><div class="k">Portfolio by health</div><div class="dist">${col("var(--red)",lo,"Low")+col("var(--amber)",med,"Medium")+col("var(--teal)",hi,"High")}</div></div>`;
}

function renderRows(){
  document.getElementById("rows").innerHTML=ORDER.map(id=>{
    const a=accounts[id],c=bandColor(a.band);
    const live=(a.live||a.liveTag)?`<span class="liveflag"><span class="g"></span>Live</span>`:"";
    return `<tr onclick="openDetail('${id}')">
      <td><div class="co">${a.name}${live}<div class="seg">${a.seg}</div></div></td>
      <td><div class="hmini"><b>${a.health}</b><div class="hbar"><i style="width:${a.health}%;background:${c}"></i></div></div></td>
      <td><span class="pill ${bandPill(a.band)}">${a.signal}</span></td>
      <td><div class="na-cell ${a.na}"><b>${a.naLabel}</b></div></td>
      <td><span class="arrow">→</span></td>
    </tr>`;
  }).join("");
}

const RECENTS=[
  {id:"democo",name:"DemoCo",active:true,status:"Active now",line:"“Where do I see the report after the call?”"},
  {id:"lumen",name:"Lumen Financial",active:false,status:"2h ago",takes:["Expansion intent, second team named","Wants hiring-manager visibility"]},
  {id:"vertex",name:"Vertex Logistics",active:false,status:"5h ago",takes:["Adoption stuck at one user","Urgency never established"]}
];
function renderRecents(){
  document.getElementById("recents").innerHTML=RECENTS.map(r=>{
    const body=r.active
      ? `<div class="line">${r.line}</div><div class="cta"><button class="stepin" onclick="openDetail('${r.id}')">Step in →</button></div>`
      : `<div class="takes">${r.takes.map(t=>`<div class="tk"><span class="b">↳</span><span>${t}</span></div>`).join("")}</div><div class="cta"><button class="view" onclick="openDetail('${r.id}')">View conversation</button></div>`;
    return `<div class="rec ${r.active?'active':''}">
      <div class="rt"><span class="nm">${r.name}</span><span class="st">${r.active?'<span class="g"></span>':''}${r.status}</span></div>
      ${body}
    </div>`;
  }).join("");
}

function ringSVG(pct,color){
  const r=56,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="128" height="128"><circle cx="64" cy="64" r="${r}" stroke="#eef1ee" stroke-width="11" fill="none"/>
    <circle cx="64" cy="64" r="${r}" stroke="${color}" stroke-width="11" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" style="transition:stroke-dashoffset 1s cubic-bezier(.4,0,.1,1)" data-target="${off}"/></svg>`;
}
function trendSVG(data,color){
  const w=560,h=150,pad=10,max=Math.max(...data),min=Math.min(...data),span=(max-min)||1;
  const pts=data.map((d,i)=>{const x=pad+(i/(data.length-1))*(w-2*pad);const y=h-pad-((d-min)/span)*(h-3*pad);return [x,y];});
  const path=pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ");
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===pts.length-1?4.5:3}" fill="${i===pts.length-1?color:"#fff"}" stroke="${color}" stroke-width="2"/>`).join("");
  return `<svg class="trend-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
}
function sentBar(split){const[p,n,g]=split;return `<div class="sent"><i class="pos" style="width:${p}%"></i><i class="neu" style="width:${n}%"></i><i class="neg" style="width:${g}%"></i></div>`;}

const portfolio=document.getElementById("portfolio");
const detail=document.getElementById("detail");

// All message text renders via textContent (XSS guard). Never innerHTML for message text.
function bubble(role,text){
  const b=document.createElement("div");
  b.className="b "+role;
  b.textContent=text;
  return b;
}
function takeawayEl(text){
  const t=document.createElement("div"); t.className="take";
  const lab=document.createElement("b"); lab.textContent="Takeaway";
  const s=document.createElement("span"); s.textContent=text;
  t.append(lab,s);
  return t;
}
function renderStaticChat(streamEl,chat){
  streamEl.innerHTML="";
  chat.forEach(m=>{
    streamEl.appendChild(bubble(m[0],m[1]));
    if(m[0]==="customer" && m[2]) streamEl.appendChild(takeawayEl(m[2]));
  });
  streamEl.scrollTop=streamEl.scrollHeight;
}

// Live wiring, DemoCo only.
let liveUnsub=null, liveMode="ai";
function stopLive(){ if(liveUnsub){ liveUnsub(); liveUnsub=null; } }

function wireLive(id,streamEl){
  const toggle=document.getElementById("toggle");
  const hinput=document.getElementById("hinput");
  const hsend=document.getElementById("hsend");
  const resetBtn=document.getElementById("reset");

  function setTakeoverUI(){
    const on = liveMode==="human";
    toggle.classList.toggle("on", on);
    toggle.textContent = on ? "Hand back to twin" : "Take over";
    hinput.disabled=!on; hsend.disabled=!on;
  }
  // reflect the real current mode on open
  getDoc(doc(db,"accounts",id)).then(s=>{ liveMode=(s.exists()&&s.data().mode)||"ai"; setTakeoverUI(); });

  toggle.onclick=async()=>{
    liveMode = liveMode==="human" ? "ai" : "human";
    await updateDoc(doc(db,"accounts",id), { mode: liveMode });
    setTakeoverUI();
  };
  async function sendHuman(){
    if(liveMode!=="human") return;
    const text=hinput.value.trim(); if(!text) return; hinput.value="";
    await addDoc(collection(db,"conversations",id,"messages"), { role:"human", text, takeaway:null, createdAt: serverTimestamp() });
  }
  hsend.onclick=sendHuman;
  hinput.addEventListener("keydown", e=>{ if(e.key==="Enter") sendHuman(); });

  resetBtn.onclick=async()=>{
    if(!confirm("Delete all messages for this account? This cannot be undone.")) return;
    resetBtn.disabled=true;
    try{
      const snap=await getDocs(collection(db,"conversations",id,"messages"));
      let batch=writeBatch(db), pending=0;
      for(const d of snap.docs){
        batch.delete(d.ref); pending++;
        if(pending===450){ await batch.commit(); batch=writeBatch(db); pending=0; }
      }
      if(pending>0) await batch.commit();
      // the live panel empties on its own via the onSnapshot listener
    }catch(err){
      console.error("reset failed", err);
      alert("Reset failed. Check the console.");
    }finally{
      resetBtn.disabled=false;
    }
  };

  // stream real messages, newest at the bottom, auto-scroll
  stopLive();
  liveUnsub = onSnapshot(query(collection(db,"conversations",id,"messages"), orderBy("createdAt","asc")), (snap)=>{
    streamEl.innerHTML="";
    if(snap.empty){
      const e=document.createElement("div"); e.className="empty";
      e.textContent="No messages yet. Send one from the chat link.";
      streamEl.appendChild(e); return;
    }
    snap.docs.forEach(d=>{
      const m=d.data();
      streamEl.appendChild(bubble(m.role, m.text||""));
      if(m.role==="customer" && m.takeaway) streamEl.appendChild(takeawayEl(m.takeaway));
    });
    streamEl.scrollTop=streamEl.scrollHeight;
  });
}

function openDetail(id){
  stopLive();
  const a=accounts[id],c=bandColor(a.band);
  const dv=a.delta>=0?"up":"down";
  const eng=a.eng.map(e=>`<div class="eng-row"><span class="n">${e[1]}</span><span class="lab">${e[0]}</span>${sentBar(e[2])}</div>`).join("");
  // live seat gets functional controls; static companies have none
  const ctrlHTML=a.live
    ? `<div class="ctrl">
        <button class="takeover" id="toggle">Take over</button>
        <input class="hinput" id="hinput" placeholder="Type as Martin..." disabled />
        <button class="hsend" id="hsend" disabled>Send</button>
        <button class="reset" id="reset">Reset conversation</button>
      </div>`
    : "";
  detail.innerHTML=`
    <button class="back" onclick="closeDetail()">← Back to book</button>
    <div class="dhead">
      <div><h2>${a.name}</h2><div class="seg">${a.seg}</div></div>
      <span class="dbadge pill ${bandPill(a.band)}">${a.live?"Live seat":a.band==="hi"?"Healthy":a.band==="med"?"Watch":"At risk"}</span>
    </div>
    <div class="dtop">
      <div class="score-card">
        <h3>Relationship score</h3>
        <div class="ring">${ringSVG(a.health,c)}<div class="num">${a.health}</div></div>
        <div class="delta ${dv}">${dv==="up"?"▲":"▼"} ${Math.abs(a.delta)} in last 14 days</div>
        <div class="stagechip">Stage <b>${KOTTER[a.stageIdx]}</b> · ${a.stageIdx+1}/6</div>
      </div>
      <div class="trend-card">
        <h3>Score over time · 12 months</h3>
        ${trendSVG(a.trend,c)}
      </div>
      <div class="panel"><h3>Conversations analyzed · sentiment</h3>${eng}</div>
      <div class="casebox ${a.na==="intervene"?"intervene":""}">
        <h3>${a.case.title}</h3>
        ${a.case.p.map(p=>`<p>${p}</p>`).join("")}
        <button class="act">${a.case.act}</button>
      </div>
    </div>
    <div class="live-card">
      <div class="lh">
        <div><h3>Live ramp conversation</h3><div class="sub">${a.live?"streaming from the customer chat":"recent ramp history"}</div></div>
        <div class="badge"><span class="g"></span> ${a.live?"Live":"Synced"}</div>
      </div>
      <div class="stream" id="stream"></div>
      ${ctrlHTML}
    </div>`;
  portfolio.classList.add("hidden");
  detail.classList.remove("hidden");
  window.scrollTo(0,0);
  requestAnimationFrame(()=>{document.querySelectorAll("[data-target]").forEach(el=>{el.style.strokeDashoffset=el.getAttribute("data-target");});});

  const streamEl=document.getElementById("stream");
  if(a.live) wireLive(id, streamEl);
  else renderStaticChat(streamEl, a.chat);
}
function closeDetail(){
  stopLive();
  detail.classList.add("hidden");
  portfolio.classList.remove("hidden");
  window.scrollTo(0,0);
}

// inline onclick handlers live in module scope; expose to the global scope
window.openDetail=openDetail;
window.closeDetail=closeDetail;

renderTop();renderRows();renderRecents();
</script>

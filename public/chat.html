<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ramp Assistant</title>
<style>
  :root{--ink:#11202e;--teal:#0f9e8e;--line:#e2e6e3;--paper:#f5f6f4;}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{font-family:system-ui,sans-serif;background:var(--paper);color:var(--ink);display:flex;justify-content:center}
  .app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;background:#fff}
  header{padding:14px 16px;background:var(--ink);color:#eaf0ee;display:flex;align-items:center;gap:8px}
  header b{font-size:15px} header span{font-size:12px;opacity:.7}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .m{max-width:84%;padding:10px 13px;border-radius:14px;font-size:15px;line-height:1.45;white-space:pre-wrap}
  .m.bot{background:var(--paper);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
  .m.user{background:var(--ink);color:#eaf0ee;align-self:flex-end;border-bottom-right-radius:4px}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:12px 14px}
  .typing i{width:7px;height:7px;border-radius:50%;background:#9aa7af;animation:b 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.15s} .typing i:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,60%,100%{opacity:.4;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
  form{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
  input{flex:1;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:16px}
  button{background:var(--teal);color:#04221e;border:0;border-radius:10px;font-weight:600;padding:0 18px;font-size:15px}
</style>
</head>
<body>
<div class="app">
  <header><b>Ramp Assistant</b><span id="acctName"></span></header>
  <div class="msgs" id="msgs"></div>
  <form id="form" autocomplete="off">
    <input id="input" placeholder="Ask anything about getting started..." />
    <button type="submit">Send</button>
  </form>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-_ooiEhmIRoOGxgrueJKJHv6DOj-kpGE",
  authDomain: "engagement-os-c0294.firebaseapp.com",
  projectId: "engagement-os-c0294",
  storageBucket: "engagement-os-c0294.firebasestorage.app",
  messagingSenderId: "262777909440",
  appId: "1:262777909440:web:4662437f82eca8249b3d25",
  measurementId: "G-9344JJVN4R"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const accountId = params.get("account") || "demo-co";
const niceName = accountId.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());
document.getElementById("acctName").textContent = niceName;

// ensure the account exists so the cockpit shows it (demo-grade rules allow this)
setDoc(doc(db,"accounts",accountId), { name:niceName, segment:"Live demo seat", status:"healthy", health:60, stageIdx:1, mode:"ai", updatedAt: serverTimestamp() }, { merge:true });

const msgsEl = document.getElementById("msgs");
const greeted = { done:false };
function addBubble(role, text){
  const d = document.createElement("div");
  d.className = "m " + (role === "customer" ? "user" : "bot");
  d.textContent = text;                 // textContent, never innerHTML (XSS guard)
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
let typingEl = null;
function showTyping(){ if(typingEl) return; typingEl=document.createElement("div"); typingEl.className="typing"; typingEl.innerHTML="<i></i><i></i><i></i>"; msgsEl.appendChild(typingEl); msgsEl.scrollTop=msgsEl.scrollHeight; }
function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }

// local greeting, not stored, keeps the API history clean
addBubble("twin", "Hi, I'm Martin. I'll help your team get up and running on Metaview. What's on your mind? Anything from first steps to rolling it out.");

const msgsRef = collection(db, "conversations", accountId, "messages");
let known = new Set();
onSnapshot(query(msgsRef, orderBy("createdAt","asc")), (snap)=>{
  snap.docChanges().forEach((ch)=>{
    if(ch.type !== "added") return;
    const id = ch.doc.id; if(known.has(id)) return; known.add(id);
    const m = ch.doc.data();
    addBubble(m.role, m.text);
  });
  const docs = snap.docs;
  const last = docs.length ? docs[docs.length-1].data() : null;
  if(last && last.role !== "customer") hideTyping();
});

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const input = document.getElementById("input");
  const text = input.value.trim(); if(!text) return;
  input.value = "";
  showTyping();
  await addDoc(msgsRef, { role:"customer", text, takeaway:null, createdAt: serverTimestamp() });
});
</script>
</body>
</html>
